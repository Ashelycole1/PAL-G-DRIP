<header class="collections-header">
  <div class="reveal">
    <div style="display: flex; justify-content: space-between; align-items: flex-end; gap: 40px; flex-wrap: wrap;">
      <div>
        <div class="section-label" style="margin-bottom: 5px;">Season '26</div>
        <h1 class="collections-header-title">THE COLLECTIONS</h1>
      </div>
      <div style="flex-grow: 1; max-width: 500px; position: relative;">
        <input type="text" id="search-box" placeholder="Search for your style..." style="width: 100%; padding: 15px 25px; border-radius: 50px; border: 1px solid var(--border); background: var(--bg-secondary); color: var(--text-primary); outline: none;">
      </div>
    </div>
  </div>
</header>

<section id="shop-section" style="padding-top: 60px;">
  <div class="category-pills reveal">
    <button class="cat-pill active" data-cat="all">All Categories</button>
    <button class="cat-pill" data-cat="Footwear">Sneakers</button>
    <button class="cat-pill" data-cat="Apparel">Apparel</button>
    <button class="cat-pill" data-cat="Essentials">Essentials</button>
    <button class="cat-pill" data-cat="Women">Women</button>
  </div>

  <div class="shop-container">
    <aside class="shop-sidebar reveal">
      <div class="filter-section">
        <div class="filter-title">Price Range</div>
        <div style="padding: 10px 0;">
          <input type="range" min="50000" max="1000000" step="10000" style="width: 100%; accent-color: var(--shop-accent);">
          <div style="display: flex; justify-content: space-between; margin-top: 10px; font-size: 0.8rem; font-weight: 600;">
            <span>UGX 50k</span>
            <span>UGX 1.0M</span>
          </div>
        </div>
      </div>

      <div class="filter-section">
        <div class="filter-title">Star Rating</div>
        <div style="display: flex; flex-direction: column; gap: 10px;">
           <label style="display: flex; align-items: center; gap: 10px; font-size: 0.9rem; cursor: pointer;">
             <input type="checkbox" checked> ⭐⭐⭐⭐ & up
           </label>
        </div>
      </div>

      <div class="filter-section">
        <div class="filter-title">Brand</div>
        <div class="brand-list">
          <div class="brand-item"><label><input type="checkbox" checked> Pal G Official</label></div>
          <div class="brand-item"><label><input type="checkbox" checked> Nike Heritage</label></div>
          <div class="brand-item"><label><input type="checkbox"> Adidas Culture</label></div>
          <div class="brand-item"><label><input type="checkbox"> New Balance</label></div>
        </div>
      </div>
    </aside>

    <div class="product-grid" id="shop-grid">
      <!-- Products injected via JS -->
    </div>
  </div>
</section>

<footer>
  <div class="footer-bottom">
    <div class="footer-copy">© 2026 PAL G DRIP HOUSE. BUILT BY NIWAMANYA RICKY</div>
    <div class="footer-copy">KAMPALA, UGANDA</div>
  </div>
</footer>

    const categories = ["Footwear", "Apparel", "Essentials", "Women"];
    const names = ["High Drip Sneaker", "Kampala Heritage", "Urban Nomad", "Afro-Chic", "Signature Cut", "Neo-Classic", "Vanguard Jacket"];
    
    function renderProducts(filter = 'all', query = '') {
      const grid = document.getElementById('shop-grid');
      grid.innerHTML = '';
      
      const searchTerm = query.toLowerCase().trim();
      
      fullImages.forEach((img, i) => {
        const cat = categories[i % categories.length];
        const name = names[i % names.length] + " (V" + (i + 1) + ")";
        
        // Apply Filters
        if (filter !== 'all' && cat !== filter) return;
        if (searchTerm && !name.toLowerCase().includes(searchTerm)) return;

        const priceVal = 30000 + (Math.random() * 55000);
        const price = "UGX " + priceVal.toLocaleString(undefined, {maximumFractionDigits:0});
        
        const card = document.createElement('div');
        card.className = 'modern-card reveal visible';
        card.innerHTML = `
          <div class="card-img-wrap">
            <img src="Rick/${img}" alt="${name}" loading="lazy">
            <div class="card-fav">♡</div>
            ${i % 5 === 0 ? '<div class="badge-top">Top item</div>' : ''}
          </div>
          <div class="card-info">
            <a href="#" class="card-name">${name}</a>
            <div class="card-footer">
              <div class="card-price">${price}</div>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    // Filter Logic
    document.querySelectorAll('.cat-pill').forEach(pill => {
      pill.addEventListener('click', () => {
        document.querySelector('.cat-pill.active').classList.remove('active');
        pill.classList.add('active');
        const query = document.getElementById('search-box').value;
        renderProducts(pill.dataset.cat, query);
      });
    });

    // Search Logic
    document.getElementById('search-box').addEventListener('input', (e) => {
        const currentCat = document.querySelector('.cat-pill.active').dataset.cat;
        renderProducts(currentCat, e.target.value);
    });

    renderProducts();
</script>
